@if (faIcon(); as icon) {
  <fa-icon [icon]="icon"></fa-icon>
}
@if (iconType(); as type) {
  @if (icon(); as icon) {
    <lab-icon
      [type]="type"
      [value]="icon"
      [text]="iconText()"
      [class.opacity-40]="toggled()"
      [class.group-hover:opacity-40]="toggleIcon() != null"
    ></lab-icon>
  }
}
@if (text(); as text) {
  <span class="line-clamp-1 grow" [class]="alignClass()">{{
    text | translate: textParams()
  }}</span>
}
@if (toggleIcon(); as icon) {
  <fa-icon
    class="absolute"
    [class]="
      toggled() ? 'text-gray-400' : 'hidden text-brand-400 group-hover:flex'
    "
    [icon]="icon"
  ></fa-icon>
}
@if (badge(); as text) {
  <div
    class="pointer-events-none absolute -right-[28px] top-[8px] w-[120px] rotate-45 bg-amber-600 py-[2px] text-center text-[8px] font-bold tracking-[0.15em] text-white opacity-90 shadow-sm"
  >
    {{ text }}
  </div>
}
