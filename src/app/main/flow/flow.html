<div class="gap-1 sm:gap-2 flex">
  <button
    type="button"
    labButton
    [faIcon]="faGear"
    text="flow.flowSettings"
    (click)="dialog.open(FlowSettingsDialog)"
  ></button>
  @let _flowData = flowBuilder.flowData();
  @if (_flowData && _flowData.nodes.length) {
    <div class="relative mr-4">
      <button
        type="button"
        labButton
        [faIcon]="faCopy"
        [text]="exportText()"
        (click)="exportBlueprint()"
      ></button>
      <div
        class="pointer-events-none absolute -right-[14px] top-[2px] z-10 rotate-12 whitespace-nowrap rounded bg-amber-600 px-1.5 py-0.5 text-center text-[9px] font-bold tracking-widest text-white shadow-sm"
      >
        EXPERIMENTAL
      </div>
    </div>
    <button
      type="button"
      labButton
      [faIcon]="faFileArrowDown"
      text="flow.downloadAsJson"
      (click)="exporter.flowToJson(_flowData)"
    ></button>
  }
</div>

<div
  id="lab-flow-svg"
  class="rounded-xs flex border border-gray-700"
  #svg
></div>
<lab-steps [focus]="true" [selectedId]="selectedId()"></lab-steps>
