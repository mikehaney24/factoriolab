<div class="gap-1 sm:gap-2 flex">
  <button
    type="button"
    labButton
    [faIcon]="faGear"
    text="flow.flowSettings"
    (click)="dialog.open(FlowSettingsDialog)"
  ></button>
  @let _flowData = flowBuilder.flowData();
  @if (_flowData && _flowData.nodes.length) {
    <div class="mr-4 flex items-center gap-2">
      <div class="relative">
        <button
          type="button"
          labButton
          [faIcon]="faCopy"
          [text]="exportText()"
          (click)="exportBlueprint()"
        ></button>
        <div
          class="pointer-events-none absolute -right-[14px] top-[2px] z-10 rotate-12 whitespace-nowrap rounded bg-amber-600 px-1.5 py-0.5 text-center text-[9px] font-bold tracking-widest text-white opacity-50 shadow-sm"
        >
          EXPERIMENTAL
        </div>
      </div>
      <label class="ms-2 flex items-center gap-1 whitespace-nowrap text-sm">
        <input type="checkbox" [checked]="exportExcludeSmelters()" (change)="exportExcludeSmelters.set(!exportExcludeSmelters())" />
        No Smelters
      </label>
    </div>
    <button
      type="button"
      labButton
      [faIcon]="faFileArrowDown"
      text="flow.downloadAsJson"
      (click)="exporter.flowToJson(_flowData)"
    ></button>
  }
</div>

<div
  id="lab-flow-svg"
  class="rounded-xs flex border border-gray-700"
  #svg
></div>
<lab-steps [focus]="true" [selectedId]="selectedId()"></lab-steps>
